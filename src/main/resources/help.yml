help:
  "1":
    lines:
      - "<gray><st>----------</st><reset> <dark_gray>[ <green>Server Help Page 1/{max} <dark_gray>]<gray><st>----------</st>"
      - ""
      - "&6<> &f= Required Arguments"
      - "&2[] &f= Optional Arguments"
      - ""
      - "&f/announcement &6<message> &e- Broadcasts an announcement message to the server."
      - "&f/broadcast &6<message> &e- Broadcasts a message to the server."
      - "&f/clearchat &e- Clears global chat."
      - "&f/colors &e- Shows a list of color codes."
      - "&f/commandspy &e- Staff can see what commands every player types on the server."
      - "&f/message &6<player> <message> &e- Sends a player a private message."
      - "&f/motd &e- Shows the servers MOTD."
      - "&f/mutechat &e- Mutes the server chat preventing players from talking in chat."
      - "&7Page 2/3. Type /chatmanager help 3 to go to the next page."
      - ""
  "2":
    lines:
      - "<gray><st>----------</st><reset> <dark_gray>[ <green>Server Help Page 2/{max} <dark_gray>]<gray><st>----------</st>"
      - ""
      - "&6<> &f= Required Arguments"
      - "&2[] &f= Optional Arguments"
      - ""
      - "&f/perworldchat bypass &e- Bypass the perworld chat feature."
      - "&f/ping &2 [player] &e- Shows your current ping."
      - "&f/reply &6<message> &e- Quickly reply to the last player to message you."
      - "&f/rules &e- Shows a list of the server rules."
      - "&f/staffchat &2[message] &e- Talk secretly to other staff members online."
      - "&f/togglechat &e- Blocks a player from receiving chat messages."
      - "&f/togglementions &e- Blocks a player from receiving mention notifications."
      - "&f/togglepm &e- Blocks players from sending private messages to you."
      - "&f/warning &6<message> &e - Broadcasts a warning message to the server."
      - ""
      - "&7Page 3/3. Type /chatmanager help 2 to go to the previous page."
      - ""
  "3":
    lines:
      - "<gray><st>----------</st><reset> <dark_gray>[ <green>Server Help Page 3/{max} <dark_gray>]<gray><st>----------</st>"
      - ""
      - "&6<> &f= Required Arguments"
      - "&2[] &f= Optional Arguments"
      - ""
      - "&f/chatmanager help &e- Help menu for chat manager."
      - "&f/chatmanager reload &e- Reloads all the configuration files."
      - "&f/chatmanager debug &e- Debugs all the configuration files."
      - "&f/antiswear &6- Shows a list of commands for Anti Swear."
      - "&f/autobroadcast &e- Shows a list of commands for Auto-Broadcast."
      - "&f/bannedcommands &e- Shows a list of commands for Banned Commands."
      - "&f/chatradius &e- Shows a list of commands for Chat Radius."
      - ""
      - "&7Page 1/3. Type /chatmanager help 2 to go to the next page."
      - ""