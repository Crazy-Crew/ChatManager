Auto_Broadcast:
  Global_Messages:
    Enable: false
    Header_And_Footer: true
    Interval: 30
    Prefix: "<gray>[<gold>AutoBroadcast<gray>] <reset>"
    Header: "<gray>*<gray><st>--------------------------------</st><gray>*"
    Footer: "<gray>*<gray><st>--------------------------------</st><gray>*"
    sound:
      toggle: false
      value: 'entity.player.levelup'
      pitch: 1
      volume: 1
    Messages:
      - "{prefix}<gray>Auto-Broadcast chat message."
      - "{prefix}<gray>Plugin created by H1DD3NxN1NJA."
      - "{prefix}<gray>Hello <red>{player} <gray>there are <red>{online} <gray>players online."
  Per_World_Messages:
    Enable: false
    Header_And_Footer: true
    Interval: 60
    Prefix: "<gray>[<gold>AutoBroadcast<gray>] <reset>"
    Header: "<gray>*<gray><st>--------------------------------</st><gray>*"
    Footer: "<gray>*<gray><st>--------------------------------</st><gray>*"
    sound:
      toggle: false
      value: 'entity.player.levelup'
      pitch: 1
      volume: 1
    Messages:
      world:
        - "{prefix}<green>Welcome to the server!"
        - "{prefix}<green>Hope you enjoy our server!"
        - "{prefix}<green>Join our discord <Link>"
        - "{prefix}<green>This server is running the plugin ChatManager by H1DD3NxN1NJA"
        - "{prefix}<aqua>You can edit these in the ChatManager > AutoBroadcast.yml"
      world_nether:
        - "{prefix}<gray>The nether is a scary place"
        - "{prefix}<green>Welcome to the server!"
        - "{prefix}<green>Hope you enjoy our server!"
        - "{prefix}<green>Join our discord <Link>"
        - "{prefix}<green>This server is running the plugin ChatManager by H1DD3NxN1NJA"
        - "{prefix}<aqua>You can edit these in the ChatManager > AutoBroadcast.yml"
      world_the_end:
        - "{prefix}<green>The end is a scary place"
        - "{prefix}<green>Watch out for the ender dragon!"
        - "{prefix}<red>Don't make eye contact with the enderman!"
  Actionbar_Messages:
    Enable: false
    Interval: 60
    Prefix: "<gray>[<gold>AutoBroadcast<gray>] <reset>"
    sound:
      toggle: false
      value: 'ENTITY_PLAYER_LEVELUP'
      pitch: 1.0
      volume: 1.0
    Messages:
      - "{prefix}<gray>Auto-Broadcast action bar message."
      - "{prefix}<gray>Plugin created by H1DD3NxN1NJA."
      - "{prefix}<gray>Hello <red>{player} <gray>there are <red>{online} <gray>players online."
  Title_Messages:
    Enable: false
    Interval: 60
    sound:
      toggle: false
      value: 'entity.player.levelup'
      pitch: 1.0
      volume: 1.0
    Title: "<red>Title"
    Messages:
      - "<gray>Auto-Broadcast title message."
      - "<gray>Plugin created by H1DD3NxN1NJA."
      - "<gray>Hello <red>{player} <gray>there are <red>{online} <gray>players online."
  Bossbar_Messages: # 1.9+
    Enable: false
    Interval: 60
    sound:
      toggle: false
      value: 'entity.player.levelup'
      pitch: 1.0
      volume: 1.0
    Bar_Time: 10 # How long the boss bar stays on for.
    Messages:
      - "<gray>Auto-Broadcast bossbar message."
      - "<gray>Plugin created by H1DD3NxN1NJA."
      - "<gray>Hello <red>{player} <gray>there are <red>{online} <gray>players online."